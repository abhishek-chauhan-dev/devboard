name: Build and Test Frontend

on:
  push:
    branches:
      - install_packages

jobs:
  install-package:
    runs-on: ubuntu-latest
    steps: 
      - name: Code Clone
        uses: actions/checkout@v7
      
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: ./frontend

      - name: Code build
        run: npm run build
        working-directory: ./frontend  
      
      - name: Code test
        run: npm run test
        working-directory: ./frontend